<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>공정 자동화 Ai 에이전트 솔루션 CMS</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body class="dashboard-body" data-nav="admin">
    <div class="app-shell">
      <aside class="sidebar" id="sidebarMount" aria-label="메인 메뉴"></aside>
      
      <div class="detail-layout">
        <header class="top-bar detail-top">
          <div class="detail-top-left">
            <span class="user-badge user-badge--inline" id="userBadge" hidden></span>
          </div>
          <button type="button" class="btn btn-ghost btn-ghost--light" id="btnLogout">로그아웃</button>
        </header>

        <main class="main-content detail-main">
          <div class="main-view main-view--paper detail-card">
            <p class="detail-back-wrap">
              <a href="/html/admin/index.html" class="link-back">← 관리자 목록</a>
            </p>
            <h1 class="view-heading" id="detailTitle">관리자 등록</h1>
            <p class="hint collection-hint" id="detailMessage" hidden></p>

            <form id="adminDetailForm" class="detail-form">
              <input type="hidden" id="fieldId" value="" />
              <label class="detail-label">
                아이디 <span class="req">*</span>
                <input type="text" id="fieldUsername" required autocomplete="username" />
              </label>
              <label class="detail-label">
                비밀번호 <span class="req" id="passwordReq">*</span>
                <input type="password" id="fieldPassword" autocomplete="new-password" />
                <span class="field-hint" id="passwordHint" hidden>비워 두면 기존 비밀번호를 유지합니다.</span>
              </label>
              <label class="detail-label">
                비밀번호 재입력 <span class="req" id="passwordConfirmReq">*</span>
                <input type="password" id="fieldPasswordConfirm" autocomplete="new-password" />
                <span class="field-hint" id="passwordConfirmHint" hidden>비밀번호 변경 시에만 입력합니다.</span>
              </label>
              <label class="detail-label">
                이름 <span class="req">*</span>
                <input type="text" id="fieldName" required autocomplete="name" />
              </label>
              <label class="detail-label">
                이메일
                <input type="email" id="fieldEmail" autocomplete="email" />
              </label>
              <label class="detail-label">
                전화
                <input type="text" id="fieldPhone" autocomplete="tel" />
              </label>
              <label class="detail-label">
                권한
                <select id="fieldRole">
                  <option value="admin">admin</option>
                  <option value="member">member</option>
                  <option value="guest">guest</option>
                </select>
              </label>

              <div class="detail-form-actions">
                <!-- <button type="button" class="btn btn-outline-light" id="btnCancel">목록</button> -->
                <button type="submit" class="btn btn-primary-solid btn-apply" id="btnApply">적용</button>
              </div>
            </form>
          </div>
        </main>
      </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/detail.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        initDashboardPage(() => {
          if (window.initAdminView) window.initAdminView();
        }).catch(() => {});
      });
    </script>
  </body>
</html>
