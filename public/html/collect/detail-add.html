<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>공정 자동화 Ai 에이전트 솔루션 CMS</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body class="dashboard-body" data-nav="collection">
    <div class="app-shell">
      <aside class="sidebar" id="sidebarMount" aria-label="메인 메뉴"></aside>

      <div class="main-column">
        <header class="top-bar">
          <div class="top-bar-title">
            <span class="user-badge user-badge--inline" id="userBadge" hidden></span>
          </div>
          <button type="button" class="btn btn-ghost btn-ghost--light" id="btnLogout">로그아웃</button>
        </header>

        <main class="main-content">
          <div class="main-view main-view--paper detail-card" style="max-width: 640px; margin: 0 auto">
            <p class="detail-back-wrap">
              <a href="/html/collect/index.html" class="link-back">← 수집부 목록</a>
            </p>
            <h1 class="view-heading">수집부 추가</h1>
            <p class="hint collection-hint" id="addMessage" hidden></p>

            <form id="collectAddForm" class="detail-form">
              <label class="detail-label">
                공정명 <span class="req">*</span>
                <input type="text" id="colProcessName" required autocomplete="off" />
              </label>
              <label class="detail-label">
                공정코드 <span class="req">*</span>
                <input type="text" id="colProcessCode" required autocomplete="off" />
              </label>
              <label class="detail-label">
                디바이스명 <span class="req">*</span>
                <input type="text" id="colDeviceName" required autocomplete="off" />
              </label>
              <label class="detail-label">
                IP <span class="req">*</span>
                <input type="text" id="colIp" required autocomplete="off" />
              </label>
              <label class="detail-label">
                Port <span class="req">*</span>
                <input type="text" id="colPort" required autocomplete="off" />
              </label>
              <label class="detail-label">
                공정상태
                <select id="colStatus">
                  <option value="정상">정상</option>
                  <option value="비정상">비정상</option>
                </select>
              </label>
              <label class="detail-label">
                자동제어여부
                <select id="colAuto">
                  <option value="ON">ON</option>
                  <option value="OFF">OFF</option>
                </select>
              </label>
              <label class="detail-label">
                사용여부
                <select id="colInUse">
                  <option value="true">사용</option>
                  <option value="false">미사용</option>
                </select>
              </label>
              <div class="detail-form-actions">
                <!-- <button type="button" class="btn btn-outline-light" id="btnCancel">목록</button> -->
                <button type="submit" class="btn btn-primary-solid btn-apply" id="btnApply">적용</button>
              </div>
            </form>
          </div>
        </main>
      </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/collect-detail-add.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        initDashboardPage(() => {
          if (window.initCollectAddView) window.initCollectAddView();
        }).catch(() => {});
      });
    </script>
  </body>
</html>
